  │   → open http://localhost:8765/minimal.html                      │

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Awwwards 3D — minimal foundation</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%23ffffff'/%3E%3C/svg%3E">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overscroll-behavior: none;
    scroll-behavior: auto;            /* MUST NOT be 'smooth' — fights Lenis */
    background: #0a0a0e;
    color: #fff;
  }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Lenis 1.1 helper classes (Lenis adds .lenis / .lenis-smooth / .lenis-stopped to html itself) */
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: hidden; }

  #webgl {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;             /* canvas does not intercept events */
    z-index: 0;
  }

  main { position: relative; z-index: 1; }
  section {
    position: relative;          /* anchor for .meta inside */
    height: 100vh;
    padding: clamp(1.5rem, 5vw, 4rem);
    display: flex; align-items: flex-end;
  }
  section h1, section h2 {
    font-weight: 600;
    font-size: clamp(2rem, 6vw, 5rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    max-width: 18ch;
  }
  section .meta {
    position: absolute; top: clamp(1.5rem, 5vw, 4rem); left: clamp(1.5rem, 5vw, 4rem);
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    opacity: 0.6;
  }

  /* Preloader */
  #preloader {
    position: fixed; inset: 0;
    background: #0a0a0e;
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9000;
    transition: opacity 0.6s ease, visibility 0.6s;
    gap: 1rem;
  }
  #preloader.done { opacity: 0; visibility: hidden; }
  .preloader-counter {
    font: 600 clamp(2.5rem, 8vw, 5rem)/1 ui-sans-serif, system-ui, sans-serif;
    letter-spacing: -0.04em;
  }
  .preloader-bar { width: clamp(160px, 30vw, 280px); height: 1px; background: rgba(255,255,255,0.12); }
  .preloader-fill { height: 100%; width: 0%; background: #fff; transition: width 0.2s ease; }

  /* Reduced-motion fallback */
  @media (prefers-reduced-motion: reduce) {
    #preloader { transition: none; }
  }

  /* Coarse-pointer: hide custom interactions if any */
  @media (pointer: coarse) {
    /* placeholder for future cursor element */
  }

  /* Static fallback if WebGL fails */
  body.no-webgl #webgl { display: none; }
  body.no-webgl::before {
    content: "WebGL unavailable — please use a modern browser";
    position: fixed; inset: 0;
    display: grid; place-items: center;
    color: #888; font-size: 0.9rem; letter-spacing: 0.05em;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
    "gsap": "https://esm.sh/gsap@3.12.5",
    "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger",
    "lenis": "https://unpkg.com/lenis@1.1.0/dist/lenis.mjs"
  }
}
</script>

<script>
  // Surface any module-load errors instead of silently sticking on the preloader
  window.addEventListener('error', (e) => {
    console.error('[awwwards-3d]', e.message, e.error);
    const c = document.querySelector('.preloader-counter');
    if (c) c.textContent = 'ERR';
    const f = document.querySelector('.preloader-fill');
    if (f) f.style.background = '#ff4d4d';
  });
  window.addEventListener('unhandledrejection', (e) => {
    console.error('[awwwards-3d] unhandled', e.reason);
    const c = document.querySelector('.preloader-counter');
    if (c) c.textContent = 'ERR';
  });
</script>
</head>
<body>

<div id="preloader" aria-hidden="true">
  <div class="preloader-counter">0</div>
  <div class="preloader-bar"><div class="preloader-fill"></div></div>
</div>

<canvas id="webgl"></canvas>

<main class="scroll-container">
  <section><span class="meta">01 — Hero</span><h1>Awwwards 3D — minimal foundation</h1></section>
  <section><span class="meta">02 — Scroll</span><h2>The lerp loop is alive</h2></section>
  <section><span class="meta">03 — Composer</span><h2>HDR · ACES · bloom · grain</h2></section>
  <section><span class="meta">04 — Outro</span><h2>Fork this template</h2></section>
</main>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────
// Awwwards 3D — minimal foundation template
// Three.js r170 + GSAP 3.12.5 + Lenis 1.1.0 + postprocessing 6.36.0
// ─────────────────────────────────────────────────────────────────────────

// WebGL feature detect first — bail out gracefully if unavailable
function detectWebGL() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl2') || c.getContext('webgl');
    if (!gl) return false;
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    const r = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : '';
    return !/SwiftShader|Software|llvmpipe/i.test(r);
  } catch (e) { return false; }
}
if (!detectWebGL()) {
  document.body.classList.add('no-webgl');
  document.getElementById('preloader').classList.add('done');
  throw new Error('WebGL unavailable');
}

import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import gsap from 'gsap';
import ScrollTrigger from 'gsap/ScrollTrigger';
import Lenis from 'lenis';

gsap.registerPlugin(ScrollTrigger);

// ── renderer ────────────────────────────────────────────────────────────
const canvas = document.getElementById('webgl');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: false,            // composer uses HDR buffer; SMAA can be added if needed
  powerPreference: 'high-performance',
  stencil: false,
  depth: true,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;  // OutputPass reads this
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;

// ── scene & camera ──────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0e);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 6);

// ── environment (synthetic, self-contained) ─────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
pmrem.dispose();

// ── lighting ────────────────────────────────────────────────────────────
const lighting = new THREE.Group(); lighting.name = 'lighting';
const key = new THREE.DirectionalLight(0xffeedd, 1.4);
key.position.set(5, 8, 5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 25;
key.shadow.bias = -0.0001;
key.shadow.radius = 8;
const sd = 6;
Object.assign(key.shadow.camera, { left: -sd, right: sd, top: sd, bottom: -sd });
key.shadow.camera.updateProjectionMatrix();

const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
fill.position.set(-5, 3, 4);

const rim = new THREE.DirectionalLight(0xffffff, 0.6);
rim.position.set(0, 4, -8);

lighting.add(key, fill, rim);
scene.add(lighting);

// ── stage (replace this block with your hero content) ───────────────────
const stage = new THREE.Group(); stage.name = 'stage';

const heroGeom = new THREE.IcosahedronGeometry(1, 1);
const heroMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, metalness: 0.92, roughness: 0.18, envMapIntensity: 1.1,
});
const hero = new THREE.Mesh(heroGeom, heroMat);
hero.castShadow = true;
hero.receiveShadow = true;
stage.add(hero);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.ShadowMaterial({ opacity: 0.4 }),
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1;
floor.receiveShadow = true;
stage.add(floor);

scene.add(stage);

// ── post-processing (three built-in, r170-compatible) ──────────────────
// HDR render target so bloom can pick up super-bright highlights properly
const hdrTarget = new THREE.WebGLRenderTarget(
  window.innerWidth, window.innerHeight,
  { type: THREE.HalfFloatType },
);
const composer = new EffectComposer(renderer, hdrTarget);
composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
composer.setSize(window.innerWidth, window.innerHeight);

composer.addPass(new RenderPass(scene, camera));

// Bloom
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.45,    // strength
  0.4,     // radius
  0.82,    // threshold
);
composer.addPass(bloomPass);

// Vignette (custom shader pass — three has no built-in)
const vignettePass = new ShaderPass({
  uniforms: {
    tDiffuse:  { value: null },
    uOffset:   { value: 0.4 },
    uDarkness: { value: 0.55 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uOffset;
    uniform float uDarkness;
    varying vec2 vUv;
    void main() {
      vec4 c = texture2D(tDiffuse, vUv);
      vec2 uv = vUv - 0.5;
      float v = smoothstep(0.8, uOffset, length(uv));
      gl_FragColor = vec4(mix(c.rgb * (1.0 - uDarkness), c.rgb, v), c.a);
    }
  `,
});
composer.addPass(vignettePass);

// OutputPass — applies renderer.toneMapping (ACES) + sRGB conversion
composer.addPass(new OutputPass());

// Film grain (final, on tone-mapped sRGB output)
const grainPass = new ShaderPass({
  uniforms: {
    tDiffuse:    { value: null },
    uTime:       { value: 0 },
    uIntensity:  { value: 0.05 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uIntensity;
    varying vec2 vUv;
    float rand(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
    void main() {
      vec4 c = texture2D(tDiffuse, vUv);
      float n = rand(vUv + uTime) - 0.5;
      gl_FragColor = vec4(c.rgb + n * uIntensity, c.a);
    }
  `,
});
composer.addPass(grainPass);

// ── lerp state container ────────────────────────────────────────────────
const state = {
  cameraY:  { current: 1.2, target: 1.2, ease: 0.06 },
  cameraZ:  { current: 6,   target: 6,   ease: 0.06 },
  heroRotY: { current: 0,   target: 0,   ease: 0.10 },
  mouseX:   { current: 0,   target: 0,   ease: 0.12 },
  mouseY:   { current: 0,   target: 0,   ease: 0.12 },
};
function damp(s, dt) {
  const f = 1 - Math.pow(1 - s.ease, dt * 60);
  s.current += (s.target - s.current) * f;
}

// ── lenis + ScrollTrigger bridge ────────────────────────────────────────
// Lenis 1.1 breaking changes:
//   - `smoothTouch` removed (use `syncTouch` if you need lerped touch — rarely)
//   - `prevent` MUST be a function. Default isn't reliably applied; pass explicitly.
const lenis = new Lenis({
  duration: 1.2,
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
  smoothWheel: true,
  prevent: () => false,
});
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time) => lenis.raf(time * 1000));
gsap.ticker.lagSmoothing(0);

// ── scroll timeline ─────────────────────────────────────────────────────
gsap.timeline({
  scrollTrigger: {
    trigger: '.scroll-container',
    start: 'top top',
    end: 'bottom bottom',
    scrub: true,
  },
})
.to(state.cameraY,  { target: -1.5, ease: 'none' }, 0)
.to(state.cameraZ,  { target:  4,   ease: 'none' }, 0)
.to(state.heroRotY, { target: Math.PI * 2, ease: 'none' }, 0);

// ── mouse parallax ──────────────────────────────────────────────────────
window.addEventListener('mousemove', (e) => {
  state.mouseX.target = (e.clientX / window.innerWidth) * 2 - 1;
  state.mouseY.target = -((e.clientY / window.innerHeight) * 2 - 1);
});

// ── resize (rAF-coalesced) ──────────────────────────────────────────────
let resizePending = false;
function onResize() {
  if (resizePending) return;
  resizePending = true;
  requestAnimationFrame(() => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    composer.setSize(w, h);
    resizePending = false;
  });
}
window.addEventListener('resize', onResize);

// ── visibility pause ────────────────────────────────────────────────────
const clock = new THREE.Clock();
let running = true, rafId = 0;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    running = false;
    cancelAnimationFrame(rafId);
  } else if (!running) {
    running = true;
    clock.getDelta();   // discard pause delta
    tick();
  }
});

// ── main tick ───────────────────────────────────────────────────────────
function tick() {
  if (!running) return;
  const delta = Math.min(clock.getDelta(), 0.1);
  const t = clock.elapsedTime;

  // 1. damp every state
  for (const k in state) damp(state[k], delta);

  // 2. apply state
  camera.position.x = state.mouseX.current * 0.30;
  camera.position.y = state.cameraY.current + state.mouseY.current * 0.20;
  camera.position.z = state.cameraZ.current;
  camera.lookAt(0, 0, 0);

  hero.rotation.y = state.heroRotY.current;
  hero.position.y = Math.sin(t * 0.6) * 0.1;     // gentle hover

  // 3. update post uniforms
  grainPass.uniforms.uTime.value = t;

  // 4. render
  composer.render();
  rafId = requestAnimationFrame(tick);
}

// ── preloader (synthetic — minimal has no async assets) ─────────────────
const preloader = document.getElementById('preloader');
const counterEl = preloader.querySelector('.preloader-counter');
const fillEl = preloader.querySelector('.preloader-fill');

let pct = 0;
const fakeLoad = setInterval(() => {
  pct = Math.min(100, pct + 6);
  counterEl.textContent = pct;
  fillEl.style.width = `${pct}%`;
  if (pct >= 100) {
    clearInterval(fakeLoad);
    setTimeout(playIntro, 220);
  }
}, 40);

function playIntro() {
  preloader.classList.add('done');
  // pre-warm shader compile so the first frame doesn't hitch
  renderer.compile(scene, camera);
  composer.render(0.016);

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.from(camera.position, { z: 14, duration: 2.2 }, 0)
    .from(camera, { fov: 55, duration: 2.2,
      onUpdate: () => camera.updateProjectionMatrix() }, 0)
    .from(hero.scale, { x: 0, y: 0, z: 0, duration: 1.4, ease: 'back.out(1.4)' }, 0.25);
}

// ── start ───────────────────────────────────────────────────────────────
tick();

// ── (optional) cleanup if you embed this in an SPA ──────────────────────
window.__awwwards3d_destroy = () => {
  cancelAnimationFrame(rafId);
  lenis.destroy();
  ScrollTrigger.getAll().forEach((t) => t.kill());
  scene.traverse((o) => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m) => {
        for (const k of Object.keys(m)) {
          if (m[k] && m[k].isTexture) m[k].dispose();
        }
        m.dispose();
      });
    }
  });
  composer.dispose();
  renderer.dispose();
  renderer.forceContextLoss();
};
</script>

</body>
</html>
